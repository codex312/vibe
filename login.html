<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRM Login · VibeGenX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    :root {
      --gold: #B0963F;
      --gold-light: #d4b05e;
      --bg-primary: #0a0a0a;
      --bg-card: #1a1a1a;
      --text-primary: #e8e0d2;
      --text-secondary: #999;
      --border-color: #2a2a2a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: radial-gradient(ellipse at center, #1a1a1a, #0a0a0a);
      color: var(--text-primary);
      font-family: 'Roboto', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-wrapper { width: 100%; max-width: 440px; }
    .login-card {
      background: var(--bg-card);
      border-radius: 24px;
      padding: 48px 40px;
      border: 1px solid var(--border-color);
      box-shadow: 0 30px 60px rgba(0,0,0,0.8);
    }
    .login-logo { text-align: center; margin-bottom: 30px; }
    .login-logo h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 2.5rem;
      font-weight: 900;
      color: var(--gold);
    }
    .login-logo h1 span { color: #fff; }
    .login-logo p { color: var(--text-secondary); font-size: 0.9rem; }
    .login-divider {
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 20px 0 30px;
      opacity: 0.3;
    }
    .login-badge { text-align: center; margin-bottom: 25px; }
    .login-badge span {
      background: rgba(176,150,63,0.15);
      padding: 6px 20px;
      border-radius: 30px;
      font-size: 0.7rem;
      color: var(--gold);
      border: 1px solid rgba(176,150,63,0.2);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    .form-group label i { color: var(--gold); margin-right: 8px; }
    .form-group input {
      width: 100%;
      padding: 14px 18px;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      color: var(--text-primary);
      font-size: 1rem;
      transition: 0.3s;
      font-family: 'Roboto', sans-serif;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 20px rgba(176,150,63,0.1);
    }
    .form-group .input-wrapper { position: relative; }
    .form-group .input-wrapper i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }
    .form-group .input-wrapper input { padding-left: 44px; }
    .password-hint { text-align: right; font-size: 0.7rem; color: var(--text-muted); margin-top: 4px; }
    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 10px 0 25px;
      font-size: 0.85rem;
    }
    .form-options label {
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .form-options label input[type="checkbox"] {
      accent-color: var(--gold);
      width: 16px;
      height: 16px;
      cursor: pointer;
    }
    .form-options a { color: var(--gold); text-decoration: none; }
    .form-options a:hover { text-decoration: underline; }
    .btn-login {
      width: 100%;
      padding: 16px;
      background: var(--gold);
      border: none;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1.1rem;
      color: #1a1a1a;
      cursor: pointer;
      transition: 0.3s;
      font-family: 'Poppins', sans-serif;
      box-shadow: 0 0 30px rgba(176,150,63,0.2);
    }
    .btn-login:hover {
      background: var(--gold-light);
      transform: translateY(-2px);
      box-shadow: 0 0 50px rgba(176,150,63,0.3);
    }
    .btn-login:disabled { opacity: 0.7; cursor: not-allowed; }
    .login-footer { text-align: center; margin-top: 25px; font-size: 0.85rem; color: var(--text-muted); }
    .login-footer a { color: var(--gold); text-decoration: none; font-weight: 600; }
    .login-footer a:hover { text-decoration: underline; }
    .back-home {
      display: inline-block;
      margin-top: 12px;
      color: var(--text-muted);
      font-size: 0.85rem;
      transition: 0.3s;
    }
    .back-home:hover { color: var(--gold); }
    .back-home i { margin-right: 8px; }
    .demo-hint {
      text-align: center;
      margin-top: 18px;
      padding: 12px;
      background: rgba(176,150,63,0.08);
      border-radius: 10px;
      border: 1px dashed rgba(176,150,63,0.2);
    }
    .demo-hint p { font-size: 0.7rem; color: var(--text-muted); }
    .demo-hint span { color: var(--gold); font-weight: 600; }

    .floating-widget {
      position: fixed;
      right: 28px;
      background: var(--bg-card);
      color: var(--gold);
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      z-index: 999;
      border: 1px solid var(--border-color);
      cursor: pointer;
      transition: 0.3s;
    }
    .floating-widget:hover { background: var(--gold); color: #1a1a1a; transform: scale(1.1); }
    #darkToggle { bottom: 110px; }
    #backTop { bottom: 170px; }
    #whatsappBtn { bottom: 30px; background: #25d366; color: #fff; border: none; width: 58px; height: 58px; font-size: 1.8rem; }
    #whatsappBtn:hover { background: #20b85f; color: #fff; }

    @media (max-width: 480px) {
      .login-card { padding: 30px 20px; }
      .login-logo h1 { font-size: 2rem; }
      .floating-widget { width: 42px; height: 42px; font-size: 1rem; right: 16px; }
      #whatsappBtn { width: 50px; height: 50px; font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-logo">
        <h1>Vibe<span>GenX</span></h1>
        <p>Lead Generation &amp; Live Transfers 24/7</p>
      </div>
      <div class="login-divider"></div>
      <div class="login-badge"><span><i class="fas fa-lock"></i> Secure CRM Portal</span></div>

      <form id="loginForm" onsubmit="return handleLogin(event)">
        <div class="form-group">
          <label><i class="fas fa-envelope"></i> Email Address</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="your@email.com" value="demo@vibegenx.com" required />
          </div>
        </div>
        <div class="form-group">
          <label><i class="fas fa-lock"></i> Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="Enter your password" value="password123" required />
          </div>
          <div class="password-hint">Minimum 8 characters</div>
        </div>

        <div class="form-options">
          <label><input type="checkbox" checked /> Remember Me</label>
          <a href="#">Forgot Password?</a>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          <i class="fas fa-sign-in-alt"></i> Login to Dashboard
        </button>
      </form>

      <div class="login-footer">
        <p>Don't have an account? <a href="#">Contact Support</a></p>
        <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Back to Home</a>
      </div>

      <div class="demo-hint">
        <p><i class="fas fa-info-circle" style="color:var(--gold);"></i> Demo: <span>demo@vibegenx.com</span> / <span>password123</span></p>
      </div>
    </div>
  </div>

  <!-- ===== FLOATING WIDGETS ===== -->
  <a href="https://wa.me/923130056221" target="_blank" class="floating-widget" id="whatsappBtn"><i class="fab fa-whatsapp"></i></a>
  <div class="floating-widget" id="darkToggle"><i class="fas fa-moon"></i></div>
  <div class="floating-widget" id="backTop"><i class="fas fa-chevron-up"></i></div>

  <!-- ===== Tawk.to ===== -->
  <script type="text/javascript">
    var Tawk_API = Tawk_API || {}, Tawk_LoadStart = new Date();
    (function() {
      var s1 = document.createElement("script"),
        s0 = document.getElementsByTagName("script")[0];
      s1.async = true;
      s1.src = 'https://embed.tawk.to/6a3ee7b1eafe991d4bf9fbed/1js2ri48h';
      s1.charset = 'UTF-8';
      s1.setAttribute('crossorigin', '*');
      s0.parentNode.insertBefore(s1, s0);
    })();
  </script>

  <script>
    // ===== DARK MODE =====
    let darkMode = localStorage.getItem('darkMode') === 'true';
    if (darkMode) {
      document.body.classList.add('light-mode');
      document.documentElement.style.setProperty('--bg-primary', '#f5f0e8');
      document.documentElement.style.setProperty('--bg-card', '#ffffff');
      document.documentElement.style.setProperty('--text-primary', '#1a1a1a');
      document.documentElement.style.setProperty('--text-secondary', '#555');
      document.documentElement.style.setProperty('--border-color', '#ddd');
      document.getElementById('darkToggle').innerHTML = '<i class="fas fa-sun"></i>';
    }

    document.getElementById('darkToggle').addEventListener('click', function() {
      document.body.classList.toggle('light-mode');
      let isLight = document.body.classList.contains('light-mode');
      localStorage.setItem('darkMode', isLight);
      if (isLight) {
        document.documentElement.style.setProperty('--bg-primary', '#f5f0e8');
        document.documentElement.style.setProperty('--bg-card', '#ffffff');
        document.documentElement.style.setProperty('--text-primary', '#1a1a1a');
        document.documentElement.style.setProperty('--text-secondary', '#555');
        document.documentElement.style.setProperty('--border-color', '#ddd');
        this.innerHTML = '<i class="fas fa-sun"></i>';
      } else {
        document.documentElement.style.setProperty('--bg-primary', '#0a0a0a');
        document.documentElement.style.setProperty('--bg-card', '#1a1a1a');
        document.documentElement.style.setProperty('--text-primary', '#e8e0d2');
        document.documentElement.style.setProperty('--text-secondary', '#999');
        document.documentElement.style.setProperty('--border-color', '#2a2a2a');
        this.innerHTML = '<i class="fas fa-moon"></i>';
      }
    });

    // ===== BACK TO TOP =====
    document.getElementById('backTop').addEventListener('click', function() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // ===== LOGIN HANDLER =====
    function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');

      if (!email || !password) {
        alert('⚠️ Please enter both email and password.');
        return false;
      }
      if (password.length < 8) {
        alert('⚠️ Password must be at least 8 characters long.');
        return false;
      }

      const originalText = btn.innerHTML;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
      btn.disabled = true;

      setTimeout(() => {
        btn.innerHTML = '<i class="fas fa-check"></i> Welcome Back!';
        btn.style.background = '#28a745';
        btn.style.color = '#fff';

        setTimeout(() => {
          window.location.href = 'crm-dashboard.html';
        }, 1000);
      }, 1500);

      return false;
    }

    // ===== ENTER KEY =====
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        const form = document.getElementById('loginForm');
        if (form) form.dispatchEvent(new Event('submit'));
      }
    });

    // ===== PASSWORD TOGGLE =====
    const passwordInput = document.getElementById('password');
    const wrapper = passwordInput.closest('.input-wrapper');
    const eyeIcon = document.createElement('i');
    eyeIcon.className = 'fas fa-eye';
    eyeIcon.style.cssText =
      'position:absolute; right:16px; top:50%; transform:translateY(-50%); color:#666; cursor:pointer; z-index:2;';
    wrapper.appendChild(eyeIcon);
    eyeIcon.addEventListener('click', function() {
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        this.className = 'fas fa-eye-slash';
      } else {
        passwordInput.type = 'password';
        this.className = 'fas fa-eye';
      }
    });
  </script>
</body>
</html>
